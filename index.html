<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇</title>
  <style>
    :root {
      color-scheme: dark;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f9fafb;
    }
    .wrap {
      text-align: center;
    }
    h1 {
      margin-bottom: 8px;
    }
    p {
      margin-top: 0;
      color: #cbd5e1;
    }
    canvas {
      background: #0f172a;
      border: 3px solid #334155;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    .meta {
      display: flex;
      justify-content: space-between;
      margin: 12px auto 0;
      width: 400px;
      max-width: 90vw;
      font-weight: 700;
    }
    button {
      margin-top: 12px;
      padding: 10px 16px;
      border: 0;
      border-radius: 10px;
      background: #22c55e;
      color: #052e16;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>贪吃蛇</h1>
    <p>方向键控制，吃到红点就会变长。</p>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="meta">
      <span>分数: <span id="score">0</span></span>
      <span id="status">进行中</span>
    </div>
    <button id="restart">重新开始</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const statusEl = document.getElementById('status');
    const restartBtn = document.getElementById('restart');

    const size = 20;
    const count = canvas.width / size;
    let snake, direction, nextDirection, food, score, timer, gameOver;

    function resetGame() {
      snake = [{ x: 10, y: 10 }];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      food = spawnFood();
      score = 0;
      gameOver = false;
      scoreEl.textContent = score;
      statusEl.textContent = '进行中';
      clearInterval(timer);
      timer = setInterval(update, 120);
      draw();
    }

    function spawnFood() {
      let newFood;
      do {
        newFood = {
          x: Math.floor(Math.random() * count),
          y: Math.floor(Math.random() * count)
        };
      } while (snake && snake.some(part => part.x === newFood.x && part.y === newFood.y));
      return newFood;
    }

    function update() {
      if (gameOver) return;

      direction = nextDirection;
      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (
        head.x < 0 || head.y < 0 ||
        head.x >= count || head.y >= count ||
        snake.some(part => part.x === head.x && part.y === head.y)
      ) {
        gameOver = true;
        statusEl.textContent = '游戏结束';
        clearInterval(timer);
        draw();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 1;
        scoreEl.textContent = score;
        food = spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function drawCell(x, y, color, radius = 4) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.roundRect(x * size + 1, y * size + 1, size - 2, size - 2, radius);
      ctx.fill();
    }

    function drawGrid() {
      ctx.fillStyle = '#0f172a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#1e293b';
      ctx.lineWidth = 1;
      for (let i = 0; i <= count; i++) {
        ctx.beginPath();
        ctx.moveTo(i * size, 0);
        ctx.lineTo(i * size, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * size);
        ctx.lineTo(canvas.width, i * size);
        ctx.stroke();
      }
    }

    function draw() {
      drawGrid();
      drawCell(food.x, food.y, '#ef4444', 999);
      snake.forEach((part, index) => {
        drawCell(part.x, part.y, index === 0 ? '#22c55e' : '#86efac');
      });
    }

    window.addEventListener('keydown', (e) => {
      const keyMap = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }
      };
      const newDir = keyMap[e.key];
      if (!newDir) return;

      if (newDir.x === -direction.x && newDir.y === -direction.y) return;
      nextDirection = newDir;
    });

    restartBtn.addEventListener('click', resetGame);
    resetGame();
  </script>
</body>
</html>
