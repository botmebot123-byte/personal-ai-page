<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Games | Yichen Hub</title>
  <link rel="icon" type="image/png" href="./assets/icon.png?v=2" />
  <style>
    body {
      margin: 0;
      font-family: "Book Antiqua", Palatino, "Palatino Linotype", serif;
      background: #f7f4ee;
      color: #1f2937;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    a {
      color: #7c4f2d;
      text-decoration: none;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }
    p {
      color: #4b5563;
      line-height: 1.7;
    }
    .card {
      margin-top: 20px;
      padding: 22px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #ddd6c8;
    }
    .card h2 {
      margin-top: 0;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    select {
      font-family: inherit;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #d4c4ae;
      background: #fbf7f1;
      color: #7c4f2d;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a id="backLink" href="./index.html">← Back to home</a>
      <select id="langSelect">
        <option value="en">English</option>
        <option value="zh">简体中文</option>
        <option value="mix">Combine</option>
      </select>
    </div>

    <h1 id="title">Games</h1>
    <p id="subtitle">This section holds game project pages, playable demos, updates, and release notes.</p>

    <div class="card">
      <h2 id="futureTitle">Future Game Project</h2>
      <p id="futureDesc">This section is reserved for future game releases and prototypes.</p>
    </div>
  </div>

  <script>
    const copy = {
      en: {
        back: '← Back to home',
        title: 'Games',
        subtitle: 'This section holds game project pages, playable demos, updates, and release notes.',
        futureTitle: 'Future Game Project',
        futureDesc: 'This section is reserved for future game releases and prototypes.'
      },
      zh: {
        back: '← 返回主页',
        title: '游戏',
        subtitle: '这里放游戏项目页面、可玩 demo、更新内容和发布说明。',
        futureTitle: '未来游戏项目',
        futureDesc: '这里预留给未来的新游戏和原型项目。'
      },
      mix: {
        back: '← 返回主页',
        title: '游戏 Games',
        subtitle: '这里放 game project pages、playable demos、更新内容和 release notes。',
        futureTitle: '未来游戏项目 Future Game Project',
        futureDesc: '这里预留给未来的新游戏和 prototype projects。'
      }
    };

    const ids = ['back','title','subtitle','snakeTitle','snakeDesc','snakeLink','futureTitle','futureDesc'];
    const langSelect = document.getElementById('langSelect');
    let currentLang = localStorage.getItem('yh-lang') || 'en';

    function applyLanguage() {
      const t = copy[currentLang];
      document.getElementById('backLink').textContent = t.back;
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('futureTitle').textContent = t.futureTitle;
      document.getElementById('futureDesc').textContent = t.futureDesc;
      langSelect.value = currentLang;
      localStorage.setItem('yh-lang', currentLang);
    }

    langSelect.addEventListener('change', () => {
      currentLang = langSelect.value;
      applyLanguage();
    });

    applyLanguage();
  </script>
</body>
</html>
