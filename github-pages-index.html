<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yichen Hub</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: #101b30;
      --panel-2: #12213b;
      --text: #eef4ff;
      --muted: #9db0cf;
      --line: #263759;
      --blue: #84a8ff;
      --green: #73f0d0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #10213e 0%, var(--bg) 55%);
      color: var(--text);
    }
    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    .hero {
      text-align: center;
      margin-bottom: 28px;
    }
    .hero h1 {
      margin: 0 0 10px;
      font-size: clamp(36px, 7vw, 58px);
    }
    .hero p {
      margin: 0 auto;
      max-width: 720px;
      color: var(--muted);
      font-size: 18px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .panel {
      background: linear-gradient(180deg, rgba(16,27,48,.96), rgba(18,33,59,.96));
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      min-height: 260px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }
    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .tag.games {
      background: rgba(132,168,255,.15);
      color: #cfe0ff;
    }
    .tag.study {
      background: rgba(115,240,208,.14);
      color: #cffff0;
    }
    .panel h2 {
      margin: 0 0 10px;
      font-size: 30px;
    }
    .panel p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
    }
    ul {
      margin: 0 0 20px;
      padding-left: 18px;
      color: var(--muted);
    }
    li { margin-bottom: 8px; }
    .btn {
      display: inline-block;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 800;
      color: #08111f;
    }
    .btn.games { background: var(--blue); }
    .btn.study { background: var(--green); }
    footer {
      margin-top: 42px;
      text-align: center;
      color: #7f92b2;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Yichen Hub</h1>
      <p>一个我自己用的小站，分成两个入口，一个放游戏，一个放学习资料。</p>
    </section>

    <section class="grid">
      <div class="panel">
        <div class="tag games">Games</div>
        <h2>游戏入口</h2>
        <p>这里放你做的游戏、试玩链接、版本更新、截图和发布页。</p>
        <ul>
          <li>浏览器游戏入口</li>
          <li>更新日志</li>
          <li>项目简介</li>
          <li>截图 / 视频 / 下载</li>
        </ul>
        <a class="btn games" href="./games.html">进入游戏区</a>
      </div>

      <div class="panel">
        <div class="tag study">Study</div>
        <h2>学习资料入口</h2>
        <p>这里放你整理的笔记、资料、教程、参考链接和学习归档。</p>
        <ul>
          <li>AI 学习笔记</li>
          <li>游戏开发资料</li>
          <li>教程收藏</li>
          <li>个人知识整理</li>
        </ul>
        <a class="btn study" href="./study.html">进入资料区</a>
      </div>
    </section>

    <footer>
      Simple, clean, and only for my own use.
    </footer>
  </div>
</body>
</html>
