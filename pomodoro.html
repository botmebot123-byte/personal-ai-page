<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Clock | Yichen Hub</title>
  <link rel="icon" type="image/png" href="./assets/icon.png?v=2" />
  <style>
    body {
      margin: 0;
      font-family: "Book Antiqua", Palatino, "Palatino Linotype", serif;
      background: #f7f4ee;
      color: #1f2937;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      text-align: center;
    }
    h1 {
      font-size: 44px;
      margin-bottom: 10px;
    }
    p {
      line-height: 1.7;
      color: #4b5563;
    }
    .card {
      margin-top: 24px;
      padding: 28px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #ddd6c8;
    }
    .timer {
      font-size: 72px;
      margin: 18px 0;
      color: #7c4f2d;
    }
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      text-align: left;
    }
    button, a, select {
      font-family: inherit;
      font-size: 16px;
    }
    button, select {
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid #d4c4ae;
      background: #fbf7f1;
      color: #7c4f2d;
      font-weight: 700;
    }
    button {
      cursor: pointer;
    }
    a {
      color: #7c4f2d;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a id="backLink" href="./index.html">← Back to home</a>
      <label>
        <span id="langLabel">Language</span>
        <select id="langSelect">
          <option value="en">English</option>
          <option value="zh">简体中文</option>
          <option value="mix">Combine</option>
        </select>
      </label>
    </div>

    <h1 id="title">Pomodoro Clock</h1>
    <p id="subtitle">A simple study timer for focus sessions and short breaks.</p>

    <div class="card">
      <div id="mode">Focus Session</div>
      <div class="timer" id="timer">25:00</div>
      <div class="controls">
        <button id="start">Start</button>
        <button id="pause">Pause</button>
        <button id="reset">Reset</button>
        <button id="switch">Switch Mode</button>
      </div>
    </div>
  </div>

  <script>
    const copy = {
      en: {
        back: '← Back to home',
        language: 'Language',
        title: 'Pomodoro Clock',
        subtitle: 'A simple study timer for focus sessions and short breaks.',
        focus: 'Focus Session',
        break: 'Break Time',
        start: 'Start',
        pause: 'Pause',
        reset: 'Reset',
        switchMode: 'Switch Mode',
        focusDone: 'Focus session complete. Time for a break.',
        breakDone: 'Break complete. Back to work.'
      },
      zh: {
        back: '← 返回主页',
        language: '语言',
        title: '番茄钟',
        subtitle: '一个简单的学习计时器，用于专注时段和短暂休息。',
        focus: '专注时间',
        break: '休息时间',
        start: '开始',
        pause: '暂停',
        reset: '重置',
        switchMode: '切换模式',
        focusDone: '专注时间结束，可以休息了。',
        breakDone: '休息结束，回到学习。'
      },
      mix: {
        back: '← 返回主页',
        language: '语言 / Language',
        title: '番茄钟 Pomodoro Clock',
        subtitle: '一个简单的 study timer，用于专注时段和短暂休息。',
        focus: '专注时间 Focus Session',
        break: '休息时间 Break Time',
        start: '开始 Start',
        pause: '暂停 Pause',
        reset: '重置 Reset',
        switchMode: '切换模式 Switch Mode',
        focusDone: '专注时间结束，time for a break.',
        breakDone: '休息结束，back to work.'
      }
    };

    const timerEl = document.getElementById('timer');
    const modeEl = document.getElementById('mode');
    const startBtn = document.getElementById('start');
    const pauseBtn = document.getElementById('pause');
    const resetBtn = document.getElementById('reset');
    const switchBtn = document.getElementById('switch');
    const langSelect = document.getElementById('langSelect');

    let currentLang = localStorage.getItem('yh-lang') || 'en';
    let focusMode = true;
    let totalSeconds = 25 * 60;
    let timer = null;

    function applyLanguage() {
      const t = copy[currentLang];
      document.getElementById('backLink').textContent = t.back;
      document.getElementById('langLabel').textContent = t.language;
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      startBtn.textContent = t.start;
      pauseBtn.textContent = t.pause;
      resetBtn.textContent = t.reset;
      switchBtn.textContent = t.switchMode;
      modeEl.textContent = focusMode ? t.focus : t.break;
      langSelect.value = currentLang;
      localStorage.setItem('yh-lang', currentLang);
    }

    function renderTime() {
      const mins = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
      const secs = String(totalSeconds % 60).padStart(2, '0');
      timerEl.textContent = `${mins}:${secs}`;
      modeEl.textContent = focusMode ? copy[currentLang].focus : copy[currentLang].break;
    }

    function startTimer() {
      if (timer) return;
      timer = setInterval(() => {
        if (totalSeconds > 0) {
          totalSeconds--;
          renderTime();
        } else {
          clearInterval(timer);
          timer = null;
          alert(focusMode ? copy[currentLang].focusDone : copy[currentLang].breakDone);
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(timer);
      timer = null;
    }

    function resetTimer() {
      pauseTimer();
      totalSeconds = focusMode ? 25 * 60 : 5 * 60;
      renderTime();
    }

    function switchMode() {
      focusMode = !focusMode;
      resetTimer();
    }

    langSelect.addEventListener('change', () => {
      currentLang = langSelect.value;
      applyLanguage();
      renderTime();
    });

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);
    switchBtn.addEventListener('click', switchMode);

    applyLanguage();
    renderTime();
  </script>
</body>
</html>
