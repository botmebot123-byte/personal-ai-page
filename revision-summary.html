      document.getElementById('chemCard2').innerHTML = t.chemCard2;
      document.getElementById('chemCard3').innerHTML = t.chemCard3;
      document.getElementById('geoCard1').innerHTML = t.geoCard1;
      document.getElementById('mathCard0').innerHTML = t.mathCard0;
      document.getElementById('mathCard1').innerHTML = t.mathCard1;
      document.getElementById('mathCard2').innerHTML = t.mathCard2;
      document.getElementById('mathCard3').innerHTML = t.mathCard3;
      document.getElementById('mathCard4').innerHTML = t.mathCard4;
      langSelect.value = currentLang;
      localStorage.setItem('yh-lang', currentLang);
      bindTerms();
    }

    function bindTerms() {
      document.querySelectorAll('.term').forEach(el => {
        el.onclick = () => {
          const key = el.dataset.term;
          const entry = glossary[key];
          if (!entry) return;
          popup.innerHTML = `<strong>${el.textContent}</strong>${entry[currentLang]}`;
          popup.style.display = 'block';
        };
      });
    }

    popup.addEventListener('click', () => {
      popup.style.display = 'none';
    });

    document.addEventListener('click', (e) => {
      if (!e.target.classList.contains('term') && !popup.contains(e.target)) {
        popup.style.display = 'none';
      }
    });

    langSelect.addEventListener('change', () => {
      currentLang = langSelect.value;
      popup.style.display = 'none';
      renderPage();
    });

    renderPage();
  </script>
</body>
</html>
