<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revision Summary</title>
  <link rel="icon" type="image/png" href="./assets/icon.png?v=2" />
  <style>
    body {
      margin: 0;
      font-family: "Book Antiqua", Palatino, "Palatino Linotype", serif;
      background: #f8f5ef;
      color: #1f2937;
    }
    .wrap {
      max-width: 1020px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    h1 {
      font-size: 44px;
      margin-bottom: 8px;
    }
    h2 {
      margin-top: 34px;
      font-size: 28px;
      border-bottom: 1px solid #d6cfc3;
      padding-bottom: 8px;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 21px;
    }
    p, li {
      line-height: 1.75;
      font-size: 16px;
    }
    .card {
      margin-top: 18px;
      padding: 22px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid #ddd6c8;
    }
    a {
      color: #7c4f2d;
      text-decoration: none;
    }
    ul {
      margin-top: 8px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    select {
      font-family: inherit;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #d4c4ae;
      background: #fbf7f1;
      color: #7c4f2d;
    }
    .term {
      color: #7c4f2d;
      border-bottom: 1px dashed #b08968;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
    }
    .section-btn {
      display: inline-block;
      margin: 8px 10px 0 0;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #d4c4ae;
      background: #fbf7f1;
      color: #7c4f2d;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
    }
    .detail-box {
      margin-top: 14px;
      padding: 16px;
      border-radius: 12px;
      background: #fcfaf6;
      border: 1px solid #e7dccb;
      display: none;
    }
    .formula {
      font-weight: 700;
      color: #7c4f2d;
      cursor: pointer;
      border-bottom: 1px dashed #b08968;
    }
    #termPopup {
      position: fixed;
      right: 20px;
      bottom: 20px;
      max-width: 360px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #fffaf3;
      border: 1px solid #d6c3aa;
      box-shadow: 0 10px 24px rgba(0,0,0,.12);
      display: none;
      z-index: 999;
    }
    #termPopup strong {
      display: block;
      margin-bottom: 6px;
      color: #7c4f2d;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a id="backLink" href="./index.html">← Back to home</a>
      <select id="langSelect">
        <option value="en">English</option>
        <option value="zh">简体中文</option>
        <option value="mix">Combine</option>
      </select>
    </div>

    <h1 id="title">Revision Summary</h1>
    <p id="subtitle">A combined revision summary for Biology, Chemistry, Geography, and Maths.</p>

    <div class="card" id="guideCard"></div>
    <div class="card" id="linksCard"></div>

    <h2 id="bioTitle">Biology</h2>
    <div class="card" id="bioCard"></div>

    <h2 id="chemTitle">Chemistry</h2>
    <div class="card" id="chemCard"></div>

    <h2 id="geoTitle">Geography</h2>
    <div class="card" id="geoCard"></div>

    <h2 id="mathTitle">Maths</h2>
    <div class="card" id="mathOverview"></div>
    <div class="card" id="formulaCard"></div>
  </div>

  <div id="termPopup"></div>

  <script>
    const glossary = {
      digestion: {
        en: 'the process of breaking down food into simpler substances that can be absorbed',
        zh: '消化，把食物分解成可被吸收的小分子',
        mix: '消化，breaking down food into absorbable substances'
      },
      immunity: {
        en: 'the body’s ability to resist infection or disease',
        zh: '免疫力，身体抵抗感染或疾病的能力',
        mix: '免疫力，the body’s ability to resist infection'
      },
      pathogen: {
        en: 'a disease-causing microorganism',
        zh: '病原体，会引起疾病的微生物',
        mix: '病原体，disease-causing microorganism'
      },
      ion: {
        en: 'a charged particle formed when an atom gains or loses electrons',
        zh: '离子，原子得到或失去电子后形成的带电粒子',
        mix: '离子，charged particle formed by gaining or losing electrons'
      },
      alkali: {
        en: 'a soluble base that dissolves in water',
        zh: '碱，能溶于水的碱性物质',
        mix: '碱，soluble base in water'
      },
      tectonicPlate: {
        en: 'a large section of the Earth’s lithosphere that moves slowly',
        zh: '板块，地球岩石圈中缓慢移动的大块区域',
        mix: '板块，large moving section of the lithosphere'
      },
      factorisation: {
        en: 'rewriting an expression as a product of factors',
        zh: '因式分解，把式子写成因式相乘的形式',
        mix: '因式分解，rewriting as a product of factors'
      },
      quadratic: {
        en: 'related to expressions containing a squared term',
        zh: '二次的，含有平方项',
        mix: '二次的，related to squared terms'
      },
      LCD: {
        en: 'lowest common denominator',
        zh: '最小公分母',
        mix: '最小公分母，lowest common denominator'
      }
    };

    const formulaData = {
      gradient: {
        label: { en: 'Gradient formula', zh: '斜率公式', mix: '斜率公式 Gradient formula' },
        formula: 'm = (y2 - y1) / (x2 - x1)',
        letters: {
          en: '<li><strong>m</strong>: gradient</li><li><strong>x1, y1</strong>: coordinates of the first point</li><li><strong>x2, y2</strong>: coordinates of the second point</li>',
          zh: '<li><strong>m</strong>：斜率</li><li><strong>x1, y1</strong>：第一个点的坐标</li><li><strong>x2, y2</strong>：第二个点的坐标</li>',
          mix: '<li><strong>m</strong>：gradient</li><li><strong>x1, y1</strong>：first point 坐标</li><li><strong>x2, y2</strong>：second point 坐标</li>'
        },
        apply: {
          en: 'Example: points (2, 3) and (6, 11). Then m = (11 - 3) / (6 - 2) = 8 / 4 = 2.',
          zh: '例子：点 (2, 3) 和 (6, 11)。代入后 m = (11 - 3) / (6 - 2) = 8 / 4 = 2。',
          mix: '例子：points (2, 3) 和 (6, 11)。代入得 m = (11 - 3) / (6 - 2) = 2。'
        },
        check: {
          en: 'Verification: x increases by 4 and y increases by 8, so the gradient is 8 ÷ 4 = 2.',
          zh: '验证：x 增加了 4，y 增加了 8，所以斜率就是 8 ÷ 4 = 2。',
          mix: '验证：x increase 4，y increase 8，所以 gradient = 8 ÷ 4 = 2。'
        }
      },
      speed: {
        label: { en: 'Speed formula', zh: '速度公式', mix: '速度公式 Speed formula' },
        formula: 'speed = distance / time',
        letters: {
          en: '<li><strong>speed</strong>: how fast something moves</li><li><strong>distance</strong>: total length travelled</li><li><strong>time</strong>: how long the journey takes</li>',
          zh: '<li><strong>speed</strong>：速度</li><li><strong>distance</strong>：路程</li><li><strong>time</strong>：时间</li>',
          mix: '<li><strong>speed</strong>：速度</li><li><strong>distance</strong>：路程</li><li><strong>time</strong>：时间</li>'
        },
        apply: {
          en: 'Example: if a car travels 150 km in 3 h, speed = 150 / 3 = 50 km/h.',
          zh: '例子：如果一辆车 3 小时走了 150 km，那么 speed = 150 / 3 = 50 km/h。',
          mix: '例子：a car 3 小时走 150 km，那么 speed = 150 / 3 = 50 km/h。'
        },
        check: {
          en: 'Verification: 50 km/h × 3 h = 150 km, so the answer is consistent.',
          zh: '验证：50 km/h × 3 h = 150 km，所以答案成立。',
          mix: '验证：50 km/h × 3 h = 150 km，所以 answer 是对的。'
        }
      },
      density: {
        label: { en: 'Density formula', zh: '密度公式', mix: '密度公式 Density formula' },
        formula: 'density = mass / volume',
        letters: {
          en: '<li><strong>density</strong>: mass per unit volume</li><li><strong>mass</strong>: amount of matter</li><li><strong>volume</strong>: space taken up</li>',
          zh: '<li><strong>density</strong>：密度</li><li><strong>mass</strong>：质量</li><li><strong>volume</strong>：体积</li>',
          mix: '<li><strong>density</strong>：密度</li><li><strong>mass</strong>：质量</li><li><strong>volume</strong>：体积</li>'
        },
        apply: {
          en: 'Example: if mass = 24 g and volume = 8 cm³, density = 24 / 8 = 3 g/cm³.',
          zh: '例子：如果 mass = 24 g，volume = 8 cm³，那么 density = 24 / 8 = 3 g/cm³。',
          mix: '例子：mass = 24 g，volume = 8 cm³，所以 density = 3 g/cm³。'
        },
        check: {
          en: 'Verification: 3 g/cm³ × 8 cm³ = 24 g, so the formula rearranges correctly.',
          zh: '验证：3 g/cm³ × 8 cm³ = 24 g，所以反代检查正确。',
          mix: '验证：3 g/cm³ × 8 cm³ = 24 g，所以 check 正确。'
        }
      }
    };

    const content = {
      en: {
        back: '← Back to home',
        title: 'Revision Summary',
        subtitle: 'A combined revision summary for Biology, Chemistry, Geography, and Maths.',
        bioTitle: 'Biology',
        chemTitle: 'Chemistry',
        geoTitle: 'Geography',
        mathTitle: 'Maths',
        guideCard: `
          <h3>How to use this page</h3>
          <ul>
            <li>Click important academic terms to see Chinese meanings.</li>
            <li>Click formulas to open sections showing letter meanings, worked examples, and verification.</li>
            <li>Use this page as a quick revision hub rather than a full textbook.</li>
          </ul>
        `,
        linksCard: `
          <h3>Helpful reference links</h3>
          <ul>
            <li><a href="https://www.khanacademy.org/science/biology" target="_blank" rel="noopener noreferrer">Khan Academy Biology</a></li>
            <li><a href="https://www.khanacademy.org/science/chemistry" target="_blank" rel="noopener noreferrer">Khan Academy Chemistry</a></li>
            <li><a href="https://www.khanacademy.org/math" target="_blank" rel="noopener noreferrer">Khan Academy Maths</a></li>
            <li><a href="https://www.bbc.co.uk/bitesize" target="_blank" rel="noopener noreferrer">BBC Bitesize</a></li>
          </ul>
        `,
        bioCard: `<h3>Core Biology Points</h3><p><span class="term" data-term="digestion">Digestion</span> breaks food into small absorbable molecules. White blood cells help defend against <span class="term" data-term="pathogen">pathogens</span> and support <span class="term" data-term="immunity">immunity</span>.</p>`,
        chemCard: `<h3>Core Chemistry Points</h3><p>An <span class="term" data-term="ion">ion</span> is a charged particle. An <span class="term" data-term="alkali">alkali</span> is a soluble base. Density questions often use the formula section below.</p>`,
        geoCard: `<h3>Core Geography Points</h3><p><span class="term" data-term="tectonicPlate">Tectonic plates</span> move slowly and are linked to earthquakes and volcanoes.</p>`,
        mathOverview: `<h3>Core Maths Points</h3><p><span class="term" data-term="factorisation">Factorisation</span>, <span class="term" data-term="quadratic">quadratics</span>, and using the <span class="term" data-term="LCD">LCD</span> are key topics here.</p>`,
        formulaCard: `
          <h3>Formula Sections</h3>
          <p>Click a formula below to open a focused study section.</p>
          <button class="section-btn formula-btn" data-formula="gradient">Gradient formula: m = (y2 - y1) / (x2 - x1)</button>
          <button class="section-btn formula-btn" data-formula="speed">Speed formula: speed = distance / time</button>
          <button class="section-btn formula-btn" data-formula="density">Density formula: density = mass / volume</button>
          <div class="detail-box" id="formulaDetail"></div>
        `,
        lettersTitle: 'Letter meanings',
        applyTitle: 'Worked example',
        checkTitle: 'Verification'
      },
      zh: {
        back: '← 返回主页',
        title: '复习总结',
        subtitle: '这里整理了 Biology、Chemistry、Geography 和 Maths 的综合复习内容。',
        bioTitle: '生物',
        chemTitle: '化学',
        geoTitle: '地理',
        mathTitle: '数学',
        guideCard: `
          <h3>如何使用本页</h3>
          <ul>
            <li>点击重要英文术语可以看中文释义。</li>
            <li>点击公式可以展开字母含义、实际套用和验证。</li>
            <li>这页适合快速复习，不是完整教材。</li>
          </ul>
        `,
        linksCard: `
          <h3>参考链接</h3>
          <ul>
            <li><a href="https://www.khanacademy.org/science/biology" target="_blank" rel="noopener noreferrer">Khan Academy Biology</a></li>
            <li><a href="https://www.khanacademy.org/science/chemistry" target="_blank" rel="noopener noreferrer">Khan Academy Chemistry</a></li>
            <li><a href="https://www.khanacademy.org/math" target="_blank" rel="noopener noreferrer">Khan Academy Maths</a></li>
            <li><a href="https://www.bbc.co.uk/bitesize" target="_blank" rel="noopener noreferrer">BBC Bitesize</a></li>
          </ul>
        `,
        bioCard: `<h3>生物核心点</h3><p><span class="term" data-term="digestion">Digestion</span> 会把食物分解成可吸收的小分子。白细胞帮助防御 <span class="term" data-term="pathogen">pathogens</span>，并支持 <span class="term" data-term="immunity">immunity</span>。</p>`,
        chemCard: `<h3>化学核心点</h3><p><span class="term" data-term="ion">Ion</span> 是带电粒子。<span class="term" data-term="alkali">Alkali</span> 是可溶于水的碱。密度题可以看下面的公式 section。</p>`,
        geoCard: `<h3>地理核心点</h3><p><span class="term" data-term="tectonicPlate">Tectonic plates</span> 会缓慢移动，并和地震、火山有关。</p>`,
        mathOverview: `<h3>数学核心点</h3><p><span class="term" data-term="factorisation">Factorisation</span>、<span class="term" data-term="quadratic">quadratics</span> 和使用 <span class="term" data-term="LCD">LCD</span> 都是重点。</p>`,
        formulaCard: `
          <h3>公式学习分区</h3>
          <p>点击下面的公式，展开对应学习内容。</p>
          <button class="section-btn formula-btn" data-formula="gradient">斜率公式: m = (y2 - y1) / (x2 - x1)</button>
          <button class="section-btn formula-btn" data-formula="speed">速度公式: speed = distance / time</button>
          <button class="section-btn formula-btn" data-formula="density">密度公式: density = mass / volume</button>
          <div class="detail-box" id="formulaDetail"></div>
        `,
        lettersTitle: '字母含义',
        applyTitle: '实际套用',
        checkTitle: '验证'
      },
      mix: {
        back: '← 返回主页',
        title: '复习总结 Revision Summary',
        subtitle: '这里整理了 Biology、Chemistry、Geography 和 Maths 的 combined revision 内容。',
        bioTitle: '生物 Biology',
        chemTitle: '化学 Chemistry',
        geoTitle: '地理 Geography',
        mathTitle: '数学 Maths',
        guideCard: `
          <h3>如何使用本页 How to use this page</h3>
          <ul>
            <li>点击 academic terms 可以看中文释义。</li>
            <li>点击 formulas 可以展开 letter meanings、worked example 和 verification。</li>
            <li>这页适合 quick revision，不是 full textbook。</li>
          </ul>
        `,
        linksCard: `
          <h3>参考链接 Helpful reference links</h3>
          <ul>
            <li><a href="https://www.khanacademy.org/science/biology" target="_blank" rel="noopener noreferrer">Khan Academy Biology</a></li>
            <li><a href="https://www.khanacademy.org/science/chemistry" target="_blank" rel="noopener noreferrer">Khan Academy Chemistry</a></li>
            <li><a href="https://www.khanacademy.org/math" target="_blank" rel="noopener noreferrer">Khan Academy Maths</a></li>
            <li><a href="https://www.bbc.co.uk/bitesize" target="_blank" rel="noopener noreferrer">BBC Bitesize</a></li>
          </ul>
        `,
        bioCard: `<h3>Core Biology Points</h3><p><span class="term" data-term="digestion">Digestion</span> 会把 food 分解成可吸收的小分子。白细胞帮助防御 <span class="term" data-term="pathogen">pathogens</span>，并支持 <span class="term" data-term="immunity">immunity</span>。</p>`,
        chemCard: `<h3>Core Chemistry Points</h3><p><span class="term" data-term="ion">Ion</span> 是 charged particle。<span class="term" data-term="alkali">Alkali</span> 是 soluble base。密度题可以看下面的 formula section。</p>`,
        geoCard: `<h3>Core Geography Points</h3><p><span class="term" data-term="tectonicPlate">Tectonic plates</span> 会 slowly move，并和 earthquakes、volcanoes 有关。</p>`,
        mathOverview: `<h3>Core Maths Points</h3><p><span class="term" data-term="factorisation">Factorisation</span>、<span class="term" data-term="quadratic">quadratics</span> 和使用 <span class="term" data-term="LCD">LCD</span> 都是 key topics。</p>`,
        formulaCard: `
          <h3>Formula Sections</h3>
          <p>点击下面的 formula，展开对应学习内容。</p>
          <button class="section-btn formula-btn" data-formula="gradient">Gradient formula: m = (y2 - y1) / (x2 - x1)</button>
          <button class="section-btn formula-btn" data-formula="speed">Speed formula: speed = distance / time</button>
          <button class="section-btn formula-btn" data-formula="density">Density formula: density = mass / volume</button>
          <div class="detail-box" id="formulaDetail"></div>
        `,
        lettersTitle: '字母含义 Letter meanings',
        applyTitle: '实际套用 Worked example',
        checkTitle: '验证 Verification'
      }
    };

    const langSelect = document.getElementById('langSelect');
    const popup = document.getElementById('termPopup');
    let currentLang = localStorage.getItem('yh-lang') || 'en';

    function renderFormulaDetail(key) {
      const t = content[currentLang];
      const data = formulaData[key];
      const box = document.getElementById('formulaDetail');
      if (!box || !data) return;
      box.style.display = 'block';
      box.innerHTML = `
        <h3>${data.label[currentLang]}</h3>
        <p><span class="formula">${data.formula}</span></p>
        <p><strong>${t.lettersTitle}</strong></p>
        <ul>${data.letters[currentLang]}</ul>
        <p><strong>${t.applyTitle}</strong></p>
        <p>${data.apply[currentLang]}</p>
        <p><strong>${t.checkTitle}</strong></p>
        <p>${data.check[currentLang]}</p>
      `;
    }

    function bindTerms() {
      document.querySelectorAll('.term').forEach(el => {
        el.onclick = () => {
          const key = el.dataset.term;
          const entry = glossary[key];
          if (!entry) return;
          popup.innerHTML = `<strong>${el.textContent}</strong>${entry[currentLang]}`;
          popup.style.display = 'block';
        };
      });
    }

    function bindFormulaButtons() {
      document.querySelectorAll('.formula-btn').forEach(btn => {
        btn.onclick = () => renderFormulaDetail(btn.dataset.formula);
      });
    }

    function renderPage() {
      const t = content[currentLang];
      document.getElementById('backLink').textContent = t.back;
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('bioTitle').textContent = t.bioTitle;
      document.getElementById('chemTitle').textContent = t.chemTitle;
      document.getElementById('geoTitle').textContent = t.geoTitle;
      document.getElementById('mathTitle').textContent = t.mathTitle;
      document.getElementById('guideCard').innerHTML = t.guideCard;
      document.getElementById('linksCard').innerHTML = t.linksCard;
      document.getElementById('bioCard').innerHTML = t.bioCard;
      document.getElementById('chemCard').innerHTML = t.chemCard;
      document.getElementById('geoCard').innerHTML = t.geoCard;
      document.getElementById('mathOverview').innerHTML = t.mathOverview;
      document.getElementById('formulaCard').innerHTML = t.formulaCard;
      langSelect.value = currentLang;
      localStorage.setItem('yh-lang', currentLang);
      bindTerms();
      bindFormulaButtons();
    }

    popup.addEventListener('click', () => {
      popup.style.display = 'none';
    });

    document.addEventListener('click', (e) => {
      if (!e.target.classList.contains('term') && !popup.contains(e.target)) {
        popup.style.display = 'none';
      }
    });

    langSelect.addEventListener('change', () => {
      currentLang = langSelect.value;
      popup.style.display = 'none';
      renderPage();
    });

    renderPage();
  </script>
</body>
</html>
