<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Materials | Yichen Hub</title>
  <link rel="icon" type="image/png" href="./assets/icon.png?v=2" />
  <style>
    body {
      margin: 0;
      font-family: "Book Antiqua", Palatino, "Palatino Linotype", serif;
      background: #f7f4ee;
      color: #1f2937;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }
    a {
      color: #7c4f2d;
      text-decoration: none;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }
    p {
      line-height: 1.7;
      color: #4b5563;
    }
    .card {
      margin-top: 20px;
      padding: 22px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #ddd6c8;
    }
    .card h2 {
      margin-top: 0;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    select {
      font-family: inherit;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid #d4c4ae;
      background: #fbf7f1;
      color: #7c4f2d;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a id="backLink" href="./index.html">← Back to home</a>
      <select id="langSelect">
        <option value="en">English</option>
        <option value="zh">简体中文</option>
        <option value="mix">Combine</option>
      </select>
    </div>

    <h1 id="title">Study Materials</h1>
    <p id="subtitle">This section holds notes, resources, revision links, and personal study materials.</p>

    <div class="card">
      <h2 id="notesTitle">AI Notes</h2>
      <p id="notesDesc">Keep AI learning notes, model summaries, and useful study records here.</p>
    </div>

    <div class="card">
      <h2 id="resTitle">Resources</h2>
      <p id="resDesc">Store reference links, course materials, revision help, and personal summaries here.</p>
    </div>
  </div>

  <script>
    const copy = {
      en: {
        back: '← Back to home',
        title: 'Study Materials',
        subtitle: 'This section holds notes, resources, revision links, and personal study materials.',
        notesTitle: 'AI Notes',
        notesDesc: 'Keep AI learning notes, model summaries, and useful study records here.',
        resTitle: 'Resources',
        resDesc: 'Store reference links, course materials, revision help, and personal summaries here.'
      },
      zh: {
        back: '← 返回主页',
        title: '学习资料',
        subtitle: '这里放笔记、资源、复习链接和个人学习资料。',
        notesTitle: 'AI 笔记',
        notesDesc: '这里可以放 AI 学习笔记、模型总结和有用的学习记录。',
        resTitle: '资料',
        resDesc: '这里可以放参考链接、课程资料、复习帮助和个人总结。'
      },
      mix: {
        back: '← 返回主页',
        title: '学习资料 Study Materials',
        subtitle: '这里放 notes、resources、revision links 和个人学习资料。',
        notesTitle: 'AI 笔记 AI Notes',
        notesDesc: '这里可以放 AI learning notes、model summaries 和有用的 study records。',
        resTitle: '资料 Resources',
        resDesc: '这里可以放 reference links、course materials、revision help 和 personal summaries。'
      }
    };

    const langSelect = document.getElementById('langSelect');
    let currentLang = localStorage.getItem('yh-lang') || 'en';

    function applyLanguage() {
      const t = copy[currentLang];
      document.getElementById('backLink').textContent = t.back;
      document.getElementById('title').textContent = t.title;
      document.getElementById('subtitle').textContent = t.subtitle;
      document.getElementById('notesTitle').textContent = t.notesTitle;
      document.getElementById('notesDesc').textContent = t.notesDesc;
      document.getElementById('resTitle').textContent = t.resTitle;
      document.getElementById('resDesc').textContent = t.resDesc;
      langSelect.value = currentLang;
      localStorage.setItem('yh-lang', currentLang);
    }

    langSelect.addEventListener('change', () => {
      currentLang = langSelect.value;
      applyLanguage();
    });

    applyLanguage();
  </script>
</body>
</html>
